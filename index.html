<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="description" content="Momentum — local-first study tracker with timer, assignments, marks, habits, and reports." />
    <title>Momentum</title>
  </head>
  <!-- Prevent dark mode flash: apply dark class before React hydrates -->
  <script>
    try {
      const raw = JSON.parse(localStorage.getItem('momentum-settings'))
      if (raw && raw.darkMode) document.documentElement.classList.add('dark')
    } catch {}
  </script>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
